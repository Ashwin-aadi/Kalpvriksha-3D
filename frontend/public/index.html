<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalpaviraksh · Concept Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #4a5568;
    --success: #10b981;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px;
  }

  /* Header */
  header {
    margin-bottom: 56px;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  h1 {
    font-family: var(--display);
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.1s forwards;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.2s forwards;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.3s forwards;
  }

  .search-wrap::before {
    content: '>';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 18px;
    font-family: var(--mono);
    pointer-events: none;
  }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 120px 18px 48px;
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(0,212,255,0.1);
  }

  input::placeholder { color: var(--muted); }

  button {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  button:hover { background: #33ddff; }
  button:active { transform: translateY(-50%) scale(0.97); }
  button:disabled { background: var(--muted); cursor: not-allowed; }

  /* Examples */
  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.4s forwards;
  }

  .example-tag {
    font-size: 11px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .example-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
    min-height: 20px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .dot.active { background: var(--success); animation: pulse 1.5s infinite; }
  .dot.loading { background: var(--accent); animation: pulse 0.8s infinite; }
  .dot.error { background: #ef4444; }

  /* Result panel */
  .result-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .result-panel.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,212,255,0.03);
  }

  .panel-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge.mock { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .badge.live { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

  /* Fields grid */
  .fields {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field {
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.3s ease forwards;
  }

  .field.full { grid-column: 1 / -1; }

  .field-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .field-value.accent { color: var(--accent); font-weight: 700; }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .tag-item {
    font-size: 11px;
    padding: 3px 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
  }

  /* Raw JSON */
  .raw-section {
    border-top: 1px solid var(--border);
  }

  .raw-toggle {
    width: 100%;
    background: none;
    border: none;
    padding: 12px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }

  .raw-toggle:hover { color: var(--accent); background: none; transform: none; }

  .raw-content {
    display: none;
    padding: 0 16px 16px;
  }

  .raw-content.open { display: block; }

  pre {
    font-size: 12px;
    line-height: 1.7;
    color: #7ec8e3;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Loader */
  .loader {
    display: none;
    padding: 40px;
    text-align: center;
  }

  .loader.active { display: block; }

  .loader-text {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    animation: blink 1s infinite;
  }

  /* Error */
  .error-msg {
    display: none;
    padding: 16px 20px;
    font-size: 12px;
    color: #ef4444;
    border-top: 1px solid rgba(239,68,68,0.2);
  }

  .error-msg.active { display: block; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">Kalpaviraksh · 3D</div>
    <h1>Concept<br><span>Explorer</span></h1>
    <p class="subtitle">// LLM extraction layer · type any concept to analyze</p>
  </header>

  <div class="search-wrap">
    <input type="text" id="queryInput" placeholder="Human Heart, Binary Tree, Democracy..." autocomplete="off" />
    <button id="analyzeBtn" onclick="analyze()">ANALYZE</button>
  </div>

  <div class="examples">
    <span class="example-tag" onclick="setQuery('Human Heart')">Human Heart</span>
    <span class="example-tag" onclick="setQuery('Binary Tree')">Binary Tree</span>
    <span class="example-tag" onclick="setQuery('Democracy')">Democracy</span>
    <span class="example-tag" onclick="setQuery('Eiffel Tower')">Eiffel Tower</span>
    <span class="example-tag" onclick="setQuery('DNA Helix')">DNA Helix</span>
    <span class="example-tag" onclick="setQuery('Black Hole')">Black Hole</span>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">ready — enter a concept above</span>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="panel-header">
      <span class="panel-title">CONCEPT RESPONSE</span>
      <span class="badge mock" id="modeBadge">MOCK MODE</span>
    </div>

    <div class="loader" id="loader">
      <div class="loader-text">ANALYZING CONCEPT...</div>
    </div>

    <div class="fields" id="fieldsGrid"></div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="raw-section">
      <button class="raw-toggle" onclick="toggleRaw()">
        <span id="rawArrow">▶</span> RAW JSON
      </button>
      <div class="raw-content" id="rawContent">
        <pre id="rawJson"></pre>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000/api/concept';

  function setQuery(val) {
    document.getElementById('queryInput').value = val;
    document.getElementById('queryInput').focus();
  }

  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });

  function setStatus(type, text) {
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    dot.className = 'dot ' + type;
    statusText.textContent = text;
  }

  function toggleRaw() {
    const content = document.getElementById('rawContent');
    const arrow = document.getElementById('rawArrow');
    content.classList.toggle('open');
    arrow.textContent = content.classList.contains('open') ? '▼' : '▶';
  }

  function renderFields(data) {
    const grid = document.getElementById('fieldsGrid');
    grid.innerHTML = '';

    const fields = [
      { key: 'query', label: 'Query', full: false, accent: true },
      { key: 'type', label: 'Concept Type', full: false, accent: true },
      { key: 'category', label: 'Category', full: false },
      { key: 'spatial_description', label: 'Spatial Description', full: true },
      { key: 'components', label: 'Components', full: false, tags: true },
      { key: 'related_terms', label: 'Related Terms', full: false, tags: true },
      { key: 'search_keywords', label: 'Search Keywords', full: true, tags: true },
    ];

    fields.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'field' + (f.full ? ' full' : '');
      div.style.animationDelay = (i * 0.05) + 's';

      const label = document.createElement('div');
      label.className = 'field-label';
      label.textContent = f.label;

      const value = document.createElement('div');
      value.className = 'field-value' + (f.accent ? ' accent' : '');

      if (f.tags && Array.isArray(data[f.key])) {
        const tagList = document.createElement('div');
        tagList.className = 'tag-list';
        data[f.key].forEach(t => {
          const tag = document.createElement('span');
          tag.className = 'tag-item';
          tag.textContent = t;
          tagList.appendChild(tag);
        });
        value.appendChild(tagList);
      } else {
        value.textContent = data[f.key] ?? '—';
      }

      div.appendChild(label);
      div.appendChild(value);
      grid.appendChild(div);
    });

    // fallback_triggered indicator
    const fb = document.createElement('div');
    fb.className = 'field full';
    fb.style.animationDelay = (fields.length * 0.05) + 's';
    fb.innerHTML = `<div class="field-label">Fallback Triggered</div>
      <div class="field-value" style="color:${data.fallback_triggered ? '#a78bfa' : '#10b981'}">
        ${data.fallback_triggered ? '⚠ YES — mock mode active' : '✓ LIVE API — real response'}
      </div>`;
    grid.appendChild(fb);
  }

  async function analyze() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) return;

    const btn = document.getElementById('analyzeBtn');
    const panel = document.getElementById('resultPanel');
    const loader = document.getElementById('loader');
    const fieldsGrid = document.getElementById('fieldsGrid');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    btn.textContent = '...';
    setStatus('loading', `analyzing "${query}"...`);

    panel.style.display = 'block';
    setTimeout(() => panel.classList.add('visible'), 10);
    loader.classList.add('active');
    fieldsGrid.innerHTML = '';
    errorMsg.classList.remove('active');

    // close raw if open
    document.getElementById('rawContent').classList.remove('open');
    document.getElementById('rawArrow').textContent = '▶';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      loader.classList.remove('active');
      renderFields(data);

      const badge = document.getElementById('modeBadge');
      if (data.fallback_triggered) {
        badge.textContent = 'MOCK MODE';
        badge.className = 'badge mock';
      } else {
        badge.textContent = 'LIVE API';
        badge.className = 'badge live';
      }

      document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
      setStatus('active', `done — ${data.type} concept detected`);

    } catch (err) {
      loader.classList.remove('active');
      errorMsg.textContent = `⚠ Could not connect to backend: ${err.message} — make sure uvicorn is running on port 8000`;
      errorMsg.classList.add('active');
      setStatus('error', 'connection failed');
    }

    btn.disabled = false;
    btn.textContent = 'ANALYZE';
  }
</script>
</body>
</html>
